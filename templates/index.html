<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Листовое стекло — модель процесса</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<main class="app-shell">
    <header class="app-header">
        <div>
            <p class="app-kicker">Модель производства листового стекла</p>
            <h1>Расчет динамики технологических параметров</h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" id="calcBtn" type="button">Рассчитать</button>
            <button class="btn btn-outline-secondary" id="randomBtn" type="button">Случайные данные</button>
            <button class="btn btn-outline-danger" id="clearBtn" type="button">Вернуть модель</button>
        </div>
    </header>

    <section class="toolbar" aria-label="Параметры запуска">
        <label>
            Время моделирования
            <input type="number" id="tEnd" value="10" min="0.1" max="100" step="0.1" class="form-control">
        </label>
        <label>
            Шаги
            <input type="number" id="steps" value="120" min="2" max="1000" step="1" class="form-control">
        </label>
        <input type="file" id="csvFileInput" accept=".csv" class="d-none">
        <button class="btn btn-outline-primary" id="csvLoadBtn" type="button">Загрузить CSV</button>
        <div class="status-line" id="statusLine">Готово к расчету</div>
    </section>

    <nav class="app-tabs" aria-label="Разделы модели">
        <button class="app-tab active" type="button" data-tab-target="params">Параметры</button>
        <button class="app-tab" type="button" data-tab-target="polynoms">Полиномы</button>
        <button class="app-tab" type="button" data-tab-target="disturbances">Возмущения</button>
        <button class="app-tab" type="button" data-tab-target="results">Результаты</button>
    </nav>

    <section class="workspace">
        <div class="tab-panel active" id="params">
            <div id="x-params-container"></div>
        </div>

        <div class="tab-panel" id="polynoms">
            <div id="poly-matrix-container" class="matrix-scroll"></div>
        </div>

        <div class="tab-panel" id="disturbances">
            <div id="z-params-container"></div>
        </div>

        <div class="tab-panel" id="results">
            <div class="result-header">
                <h2>Динамика X1-X13</h2>
                <span id="resultMeta">Расчет еще не выполнялся</span>
            </div>

            <div class="chart-wrap line-chart-wrap">
                <canvas id="lineChart"></canvas>
            </div>

            <div class="radar-grid">
                <div>
                    <h3>Начало</h3>
                    <div class="chart-wrap radar-wrap"><canvas id="radarChart0"></canvas></div>
                </div>
                <div>
                    <h3>Середина</h3>
                    <div class="chart-wrap radar-wrap"><canvas id="radarChart1"></canvas></div>
                </div>
                <div>
                    <h3>Конец</h3>
                    <div class="chart-wrap radar-wrap"><canvas id="radarChart2"></canvas></div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="/static/js/chart.min.js"></script>
<script src="/static/js/param.js"></script>
<script src="/static/js/data.js"></script>
<script src="/static/js/graph.js"></script>
</body>
</html>
