<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор по теме "Хранилище данных"</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background: #f4f7f6; padding: 20px; }
        .tab-content { background: white; padding: 20px; border: 1px solid #dee2e6; border-top: none; }
        .container-scroll { overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">Калькулятор по теме "Хранилище данных"</h2>

    <ul class="nav nav-tabs" id="calculatorTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#params">Параметры</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#polynoms">Полиномы</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#disturbances">Возмущения</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#results">Результаты</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="params">
            <div id="x-params-container"><h5>Начальные параметры X<sub>i</sub></h5></div>
        </div>
        <div class="tab-pane fade" id="polynoms">
            <div id="poly-matrix-container" class="container-scroll"><h5>Коэффициенты полиномов [a, b, c, d]</h5></div>
        </div>
        <div class="tab-pane fade" id="disturbances">
            <div id="z-params-container"><h5>Возмущения Z<sub>k</sub>(t)</h5></div>
        </div>
        <div class="tab-pane fade" id="results">
    <div class="row mb-4">
        <div class="col-12">
            <h5>Динамика изменения показателей X₁–X₁₄</h5>
            <div style="height: 450px;">
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4">
            <h6 class="text-center">Начало процесса (t=0)</h6>
            <div style="height: 350px;"><canvas id="radarChart0"></canvas></div>
        </div>
        <div class="col-md-4">
            <h6 class="text-center">Середина процесса</h6>
            <div style="height: 350px;"><canvas id="radarChart1"></canvas></div>
        </div>
        <div class="col-md-4">
            <h6 class="text-center">Конец процесса</h6>
            <div style="height: 350px;"><canvas id="radarChart2"></canvas></div>
        </div>
    </div>
    <button class="btn btn-primary mt-4" id="calcBtn">Рассчитать систему</button>
</div>
        <div class="mt-3">
            <button class="btn btn-warning" id="randomBtn">Заполнить рандомом</button>
            <button class="btn btn-secondary" id="clearBtn">Сброс</button>
        </div>
        <div class="mt-3">
            <input type="file" id="csvFileInput" accept=".csv" class="form-control d-none">
            <button class="btn btn-primary" onclick="document.getElementById('csvFileInput').click()">Загрузить из CSV</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/static/js/param.js"></script>
<script src="/static/js/data.js"></script>
<script src="/static/js/graph.js"></script>

</body>
</html>
